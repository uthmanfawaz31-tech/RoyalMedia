<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoyalMedia Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="login-page">
  <div class="login-box">
    <img src="assets/logo/photo_5845917606664146073_y.jpg" class="login-logo" alt="RoyalMedia Logo">
    <input type="password" id="password" placeholder="Enter password" />
    <button type="button" id="togglePassword" onclick="togglePasswordVisibility()"
      aria-label="Show password">👁️</button>
    <button onclick="login()">🔐 Login</button>
  </div>

  <!-- Error Modal -->
  <div id="errorModal" class="modal">
    <div class="modal-content">
      <div class="modal-icon">❌</div>
      <h2>Incorrect Password</h2>
      <p>Please check your password and try again.</p>
      <button class="modal-close-btn" onclick="closeErrorModal()">Try Again</button>
    </div>
  </div>

  <script src="script.js?v=1.0.1"></script>
</body>

</html>
